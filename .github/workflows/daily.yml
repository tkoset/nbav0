name: Daily NBA Player/Transaction Update

on:
  schedule:
    # Her gün 10:00 UTC (TR saatiyle 13:00) çalışır.
    - cron: "0 10 * * *"
  workflow_dispatch: {}  # GitHub arayüzünden "Run workflow" ile manuel de tetiklenebilir
                          # İLK KURULUM için de bu manuel tetikleme kullanılır --
                          # players.json henüz yoksa script otomatik baseline oluşturur.

permissions:
  contents: write

jobs:
  update-players:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: Oyuncu verisini güncelle (ESPN üzerinden)
        run: python update_players.py

      - name: Değişiklikleri commit'le
        run: |
          git config user.name "nba-sticker-bot"
          git config user.email "actions@github.com"
          git add players.json transactions.json
          git diff --quiet --cached || git commit -m "Player/transaction update $(date -u +%Y-%m-%d)"
          git push
