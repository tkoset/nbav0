name: Daily NBA Transaction Check

on:
  schedule:
    # Her gün 10:00 UTC (TR saatiyle yaz saatinde 13:00) çalışır.
    # NBA transferleri genelde ABD gecesi/gündüzü olur, istersen saati değiştirebilirsin.
    - cron: "0 10 * * *"
  workflow_dispatch: {}  # GitHub arayüzünden "Run workflow" ile manuel de tetiklenebilir

permissions:
  contents: write

jobs:
  check-transactions:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install nba_api

      - name: Transaction kontrolünü çalıştır
        run: python check_transactions.py

      - name: Değişiklikleri commit'le
        run: |
          git config user.name "nba-sticker-bot"
          git config user.email "actions@github.com"
          git add players.json transactions.json
          git diff --quiet --cached || git commit -m "Daily roster/transaction update $(date -u +%Y-%m-%d)"
          git push
